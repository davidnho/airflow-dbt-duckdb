name: Python Hello World

on:
  workflow_dispatch: 
  push:
    branches:
      - main

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show main folder path
        run: echo "Repo root is: ${{ github.workspace }}"

      - name: Show Path
        run: |
          python scripts/check_paths.py
