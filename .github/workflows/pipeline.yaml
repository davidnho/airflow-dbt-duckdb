name: Airflow-DBT-DuckDB-Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  run-pipeline:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade Pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Airflow
        run: |
          AIRFLOW_VERSION=2.10.5
          PYTHON_VERSION=3.11

          pip install \
            "apache-airflow==${AIRFLOW_VERSION}" \
            --constraint \
            "https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-${PYTHON_VERSION}.txt"

      - name: Install Project Dependencies
        run: |
          pip install -r requirements.txt

      - name: Create Required Folders
        run: |
          mkdir -p warehouse
          mkdir -p logs

      - name: Validate Project Structure
        run: |
          echo "Project Structure:"
          ls -R

      - name: Load CSV into DuckDB
        run: |
          python ${{ github.workspace }} + "/" + scripts/load_csv.py

      - name: Verify DuckDB Database Created
        run: |
          ls -lah warehouse/

      - name: Run DBT Models
        run: |
          cd dbt_project
          dbt debug --profiles-dir .
          dbt run --profiles-dir .

      - name: Run DBT Tests
        run: |
          cd dbt_project
          dbt test --profiles-dir .

      - name: Generate DBT Documentation
        run: |
          cd dbt_project
          dbt docs generate --profiles-dir .

      - name: Upload DBT Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: |
            dbt_project/target

      - name: Upload DuckDB Database
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-database
          path: |
            warehouse/sales.duckdb

      - name: Pipeline Completed
        run: |
          echo "Pipeline executed successfully!"
